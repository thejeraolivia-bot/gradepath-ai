<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | GradePath AI</title>
</head>
<body>
  <main style="max-width:620px; margin:0 auto; padding:60px 24px;">
    <a href="index.html" style="display:inline-block; margin-bottom:32px;">
      ← Back to GradePath AI
    </a>

    <p style="font-weight:bold; letter-spacing:1px;">GRADEPATH AI ACCOUNT</p>
    <h1>Choose a new password</h1>
    <p>Enter a new password for your account.</p>

    <form id="resetPasswordForm" style="margin-top:28px;">
      <label>
        New password
        <input
          id="newPassword"
          type="password"
          required
          minlength="6"
          placeholder="At least 6 characters"
          style="display:block; width:100%; margin-top:8px; padding:14px; font-size:16px;"
        />
      </label>

      <label style="display:block; margin-top:18px;">
        Confirm new password
        <input
          id="confirmPassword"
          type="password"
          required
          minlength="6"
          placeholder="Type it again"
          style="display:block; width:100%; margin-top:8px; padding:14px; font-size:16px;"
        />
      </label>

      <button
        type="submit"
        style="margin-top:22px; padding:14px 18px; cursor:pointer;"
      >
        Update password
      </button>
    </form>

    <p id="resetMessage" style="margin-top:16px;"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    const resetPasswordForm = document.getElementById("resetPasswordForm");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const resetMessage = document.getElementById("resetMessage");

    resetPasswordForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (newPassword.value !== confirmPassword.value) {
        resetMessage.textContent = "Your passwords do not match.";
        return;
      }

      resetMessage.textContent = "Updating your password...";

      const { error } = await supabaseClient.auth.updateUser({
        password: newPassword.value
      });

      if (error) {
        resetMessage.textContent =
          "This reset link may have expired. Please request a new password reset email.";
        return;
      }

      resetMessage.textContent =
        "Password updated. You can now log in with your new password.";

      setTimeout(() => {
        window.location.href = "account.html";
      }, 1800);
    });
  </script>
</body>
</html>
